<header class="public-header">
    <div class="logo">
        <img src="/logo.png" alt="MoneyTracker Logo" class="logo-img">
        <span>MoneyTracker</span>
    </div>
    <nav>
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        <a routerLink="/faq" routerLinkActive="active">FAQ</a>
        <a routerLink="/subscriptions" routerLinkActive="active">Pricing</a>
        <a routerLink="/contact" routerLinkActive="active">Contact Us</a>
    </nav>
    <div class="auth-actions">
        <button class="btn-login">Log In</button>
        <button class="btn-signup">Sign Up</button>
    </div>
</header>
