<footer class="public-footer">
    <div class="footer-content">
        <div class="footer-brand">
            <div class="logo">
                <img src="/logo.png" alt="MoneyTracker Logo" class="logo-img">
                <span>MoneyTracker</span>
            </div>
            <p class="tagline">Simplifying your financial life, one dashboard at a time.</p>
        </div>

        <div class="footer-links">
            <div class="link-group">
                <h4>Product</h4>
                <a [routerLink]="['/']" fragment="features">Features</a>
                <a routerLink="/subscriptions">Pricing</a>
                <a routerLink="/faq">FAQ</a>
            </div>
            <div class="link-group">
                <h4>Company</h4>
                <a routerLink="/contact">Contact Us</a>
                <a routerLink="/privacy-policy">Privacy Policy</a>
                <a routerLink="/terms">Terms &amp; Conditions</a>
            </div>
            <div class="link-group">
                <h4>Connect</h4>
                <a href="https://twitter.com" target="_blank" rel="noopener">Twitter</a>
                <a href="https://linkedin.com" target="_blank" rel="noopener">LinkedIn</a>
                <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
            </div>
        </div>
    </div>

    <div class="footer-bottom">
        <p>&copy; {{ currentYear }} MoneyTracker. All rights reserved.</p>
    </div>
</footer>
