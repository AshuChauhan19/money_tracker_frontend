<div class="dashboard-content">
    <div class="welcome-header">
        <h1>Welcome back, John! 👋</h1>
        <p>Here's what's happening with your money today.</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card glass-card" *ngFor="let stat of stats">
            <div class="stat-header">
                <span class="stat-icon">{{ stat.icon }}</span>
                <span class="stat-trend" [class.positive]="stat.trend.startsWith('+')">{{ stat.trend }}</span>
            </div>
            <div class="stat-body">
                <h3>{{ stat.value }}</h3>
                <p>{{ stat.label }}</p>
            </div>
        </div>
    </div>

    <div class="dashboard-grid">
        <!-- Main Chart Area -->
        <div class="chart-section glass-card">
            <div class="section-header">
                <h2>Cash Flow Overview</h2>
                <select class="time-range">
                    <option>Last 30 Days</option>
                    <option>Last 6 Months</option>
                    <option>Yearly</option>
                </select>
            </div>
            <div class="chart-placeholder">
                <div class="bars">
                    <div class="bar" style="height: 60%"></div>
                    <div class="bar" style="height: 80%"></div>
                    <div class="bar" style="height: 45%"></div>
                    <div class="bar" style="height: 90%"></div>
                    <div class="bar" style="height: 70%"></div>
                    <div class="bar" style="height: 85%"></div>
                    <div class="bar" style="height: 50%"></div>
                </div>
            </div>
        </div>

        <!-- Recent Transactions -->
        <div class="transactions-section glass-card">
            <div class="section-header">
                <h2>Recent Transactions</h2>
                <button class="view-all">View All</button>
            </div>
            <div class="transaction-list">
                <div class="transaction-item" *ngFor="let tx of recentTransactions">
                    <div class="tx-info">
                        <div class="tx-avatar">{{ tx.name[0] }}</div>
                        <div class="tx-details">
                            <p class="tx-name">{{ tx.name }}</p>
                            <p class="tx-date">{{ tx.date }} • {{ tx.category }}</p>
                        </div>
                    </div>
                    <div class="tx-amount" [class.negative]="tx.amount.startsWith('-')">
                        {{ tx.amount }}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
