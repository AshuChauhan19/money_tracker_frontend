<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <div class="logo" routerLink="/">
                <img src="/logo.png" alt="Logo" class="logo-img">
                <span>MoneyTracker</span>
            </div>
            <h1>Welcome back</h1>
            <p>Please enter your details to sign in.</p>
        </div>

        <form class="auth-form">
            <div class="form-group has-icon">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>
            </div>

            <div class="form-group has-icon">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input [type]="showPassword ? 'text' : 'password'" id="password" placeholder="••••••••">
                    <button type="button" class="view-toggle" (click)="togglePassword()">
                        {{ showPassword ? '👁️' : '👁️‍🗨️' }}
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox">
                    <span>Remember for 30 days</span>
                </label>
                <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-full" routerLink="/auth/plans">Sign in</button>
            <button type="button" class="btn btn-outline w-full google-btn">
                <img src="https://www.google.com/favicon.ico" alt="Google">
                Sign in with Google
            </button>
        </form>

        <p class="auth-footer">
            Don't have an account? <a routerLink="/signup">Sign up for free</a>
        </p>
    </div>
</div>
