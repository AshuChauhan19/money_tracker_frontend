<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <div class="logo" routerLink="/">
                <img src="/logo.png" alt="Logo" class="logo-img">
                <span>MoneyTracker</span>
            </div>

            <ng-container *ngIf="step === 'credentials'">
                <h1>Welcome back</h1>
                <p>Enter your details to access your account.</p>
            </ng-container>

            <ng-container *ngIf="step === 'otp'">
                <h1>Verify identity</h1>
                <p>We've sent a code <b>{{ credentials.email }}</b></p>
            </ng-container>
        </div>


        <!-- Credentials Step -->
        <form *ngIf="step === 'credentials'" class="auth-form" (ngSubmit)="onLoginSubmit()">
            <div class="form-group has-icon">
                <label for="email">Email address</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="email" name="email" [(ngModel)]="credentials.email"
                        placeholder="john@example.com" required autocomplete="email">
                </div>
            </div>

            <div class="form-group has-icon">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input [type]="showPassword ? 'text' : 'password'" id="password" name="password"
                        [(ngModel)]="credentials.password" placeholder="••••••••" required
                        autocomplete="current-password">
                    <button type="button" class="view-toggle" (click)="togglePassword()">
                        {{ showPassword ? '👁️' : '👁️‍🗨️' }}
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox">
                    <span>Stay logged in</span>
                </label>
                <a routerLink="/forgot-password" class="forgot-link">Help me sign in</a>
            </div>

            <button type="submit" class="btn btn-primary w-full"
                [disabled]="loading || !credentials.email || !credentials.password">
                {{ loading ? 'Securing...' : 'Verify Identity' }}
            </button>
        </form>

        <!-- OTP Step -->
        <form *ngIf="step === 'otp'" class="auth-form otp-form" (ngSubmit)="onVerifySubmit()">
            <div class="form-group">
                <label class="otp-label text-center">4-digit verification code</label>
                <div class="otp-input-container">
                    <input *ngFor="let digit of otpDigits; let i = index; trackBy: trackByIndex" type="text"
                        inputmode="numeric" id="otp-{{i}}" name="otp-{{i}}" [(ngModel)]="otpDigits[i]" maxlength="1"
                        class="otp-digit-input" (input)="onOtpInput($event, i)" (keydown)="onKeyDown($event, i)"
                        (paste)="onPaste($event)" required placeholder="•">
                </div>
                <p class="otp-hint text-center">Copy-paste or type the security code.</p>
            </div>

            <button type="submit" class="btn btn-primary w-full" [disabled]="loading || !isOtpComplete">
                {{ loading ? 'Verifying...' : 'Verify & Continue' }}
            </button>

            <div class="otp-actions">
                <button type="button" class="btn btn-link link-glow" (click)="resendOtp()">Resend Security Code</button>
                <button type="button" class="btn btn-link link-alt" (click)="goBack()">Change Email</button>
            </div>
        </form>

        <p class="auth-footer" *ngIf="step === 'credentials'">
            Don't have an account? <a routerLink="/signup" class="highlight-link">Sign up for free</a>
        </p>
    </div>
</div>
