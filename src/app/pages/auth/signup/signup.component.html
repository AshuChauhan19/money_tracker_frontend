<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <div class="logo" routerLink="/">
                <img src="/logo.png" alt="Logo" class="logo-img">
                <span>MoneyTracker</span>
            </div>
            <h1>Create an account</h1>
            <p>Start your journey to financial freedom today.</p>
        </div>

        <form class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First name</label>
                    <div class="input-wrapper">
                        <input type="text" id="firstName" placeholder="John">
                    </div>
                </div>
                <div class="form-group">
                    <label for="lastName">Last name</label>
                    <div class="input-wrapper">
                        <input type="text" id="lastName" placeholder="Doe">
                    </div>
                </div>
            </div>

            <div class="form-group has-icon">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="email" placeholder="john@example.com">
                </div>
            </div>

            <div class="form-group has-icon">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input [type]="showPassword ? 'text' : 'password'" id="password" placeholder="Create a password">
                    <button type="button" class="view-toggle" (click)="togglePassword()">
                        {{ showPassword ? '👁️' : '👁️‍🗨️' }}
                    </button>
                </div>
                <p class="password-hint">Must be at least 8 characters.</p>
            </div>

            <div class="form-options">
                <label class="terms">
                    <input type="checkbox">
                    <span>I agree to the <a routerLink="/terms">Terms</a> and <a
                            routerLink="/privacy-policy">Privacy</a></span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary w-full" routerLink="/auth/plans">Create account</button>
            <button type="button" class="btn btn-outline w-full google-btn">
                <img src="https://www.google.com/favicon.ico" alt="Google">
                Sign up with Google
            </button>
        </form>

        <p class="auth-footer">
            Already have an account? <a routerLink="/login">Log in</a>
        </p>
    </div>
</div>
