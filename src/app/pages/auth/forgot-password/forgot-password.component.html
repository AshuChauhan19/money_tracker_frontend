<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <div class="logo" routerLink="/">
                <img src="/logo.png" alt="Logo" class="logo-img">
                <span>MoneyTracker</span>
            </div>

            <ng-container *ngIf="step === 'email'">
                <h1>Forgot password</h1>
                <p>Enter your email to receive a verification code.</p>
            </ng-container>

            <ng-container *ngIf="step === 'otp'">
                <h1>Verify identity</h1>
                <p>Enter the 4-digit code sent to your email.</p>
            </ng-container>

            <ng-container *ngIf="step === 'reset'">
                <h1>New password</h1>
                <p>Create a secure password for your account.</p>
            </ng-container>
        </div>

        <!-- Email Step -->
        <form *ngIf="step === 'email'" class="auth-form" (ngSubmit)="onSendOtp()">
            <div class="form-group has-icon">
                <label for="email">Email address</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="email" name="email" [(ngModel)]="formData.email"
                        placeholder="john@example.com" required autocomplete="email">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-full" [disabled]="loading || !formData.email">
                {{ loading ? 'Sening...' : 'Send Code' }}
            </button>

            <button type="button" class="btn btn-link w-full text-center" routerLink="/login">
                Back to Login
            </button>
        </form>

        <!-- OTP Step -->
        <div *ngIf="step === 'otp'" class="auth-form">
            <div class="form-group">
                <div class="otp-input-container">
                    <input *ngFor="let digit of otpDigits; let i = index; trackBy: trackByIndex" type="text"
                        inputmode="numeric" id="otp-{{i}}" name="otp-{{i}}" [(ngModel)]="otpDigits[i]" maxlength="1"
                        class="otp-digit-input" (input)="onOtpInput($event, i)" (keydown)="onKeyDown($event, i)"
                        (paste)="onPaste($event)" required placeholder="•">
                </div>
            </div>

            <button type="button" class="btn btn-primary w-full" (click)="onVerifyOtp()" [disabled]="loading || !isOtpComplete">
                {{ loading ? 'Verifying...' : 'Verify & Continue' }}
            </button>

            <div class="otp-actions">
                <button type="button" class="btn btn-link link-glow" (click)="onSendOtp()">Resend Code</button>
                <button type="button" class="btn btn-link link-alt" (click)="goBack()">Change Email</button>
            </div>
        </div>

        <!-- Reset Step -->
        <form *ngIf="step === 'reset'" class="auth-form" (ngSubmit)="onResetPassword()">
            <div class="form-group has-icon">
                <label for="newPassword">New Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input [type]="showPassword ? 'text' : 'password'" id="newPassword" name="newPassword"
                        [(ngModel)]="formData.newPassword" placeholder="••••••••" required>
                    <button type="button" class="view-toggle" (click)="togglePassword()">
                        {{ showPassword ? '👁️' : '👁️‍🗨️' }}
                    </button>
                </div>
            </div>

            <div class="form-group has-icon">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input [type]="showPassword ? 'text' : 'password'" id="confirmPassword" name="confirmPassword"
                        [(ngModel)]="formData.confirmPassword" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-full"
                [disabled]="loading || !formData.newPassword || !formData.confirmPassword">
                {{ loading ? 'Resetting...' : 'Reset Password' }}
            </button>

            <button type="button" class="btn btn-link w-full text-center" (click)="goBack()">
                Back
            </button>
        </form>
    </div>
</div>
